{% extends 'base.html' %}
{% block content %}
<meta http-equiv="refresh" content="5">

<div class="min-h-screen w-full flex items-center justify-center bg-[#020b1a] font-sans">

    <!-- Background Effects -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-1/3 left-1/4 w-96 h-96 bg-yellow-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/3 right-1/4 w-96 h-96 bg-orange-600/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="relative z-20 w-[90%] max-w-[450px] p-8 rounded-3xl bg-[#0a1120]/80 backdrop-blur-2xl shadow-2xl border border-white/5 text-center">

        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-yellow-500/10 text-yellow-500 mb-6 animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h2 class="text-3xl font-bold text-white mb-4">Approval Pending</h2>

        <p class="text-gray-300 mb-6 leading-relaxed">
            Your account is currently under review by our administrators. <br>
            <span class="text-sm text-gray-500">This page will refresh automatically.</span>
        </p>

        <div class="flex justify-center">
            <div class="flex space-x-2 items-center mb-8">
                <div class="w-2 h-2 bg-yellow-500 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                <div class="w-2 h-2 bg-yellow-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                <div class="w-2 h-2 bg-yellow-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
            </div>
        </div>

        <a href="/logout"
           class="inline-block w-full bg-gradient-to-r from-red-500/80 to-red-700/80 hover:from-red-500 hover:to-red-700 text-white py-3 rounded-xl font-semibold transition-all shadow-lg border border-red-500/20">
            Logout
        </a>

    </div>
</div>
{% endblock %}
