 {% extends 'base.html' %}
{% block content %}
<div class="min-h-screen w-full flex items-center justify-center relative overflow-hidden bg-[#020b1a] font-sans">
  
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute left-[5%] bottom-[10%] opacity-30 hidden lg:block">
        <div class="w-64 h-48 border-t-8 border-indigo-500/30 rounded-lg bg-gradient-to-b from-indigo-900/20 to-transparent relative">
           <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 text-[80px] text-indigo-400/20">📈</div>
        </div>
    </div>
    <div class="absolute top-[10%] right-[10%] w-80 h-80 bg-blue-600/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[10%] left-[10%] w-80 h-80 bg-purple-600/10 rounded-full blur-[120px]"></div>
  </div>

  <div class="relative z-20 w-[95%] max-w-[600px] p-[2px] rounded-[2.5rem] bg-gradient-to-b from-white/20 to-transparent backdrop-blur-2xl shadow-[0_0_50px_rgba(0,0,0,0.5)] my-10">
    
    <div class="w-full h-full bg-[#0a1120]/85 rounded-[2.4rem] p-8 md:p-12 flex flex-col items-center border border-white/5">
      
      {% if messages %}
        {% for message in messages %}
          <div class="w-full mb-6 p-4 rounded-xl border border-cyan-500/50 bg-cyan-500/10 text-cyan-200 text-center shadow-[0_0_15px_rgba(6,182,212,0.2)]">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <h2 class="text-4xl md:text-5xl font-bold text-white mb-2 tracking-wide text-center">Create Account</h2>
      <p class="text-gray-400 mb-10 text-center">Join our secure digital banking network</p>

      <form method="POST" class="w-full space-y-5">
        
        <div class="grid grid-cols-2 gap-4 mb-6">
           <button type="button" onclick="setRegRole('customer')" id="regCustomer" class="reg-role py-3 rounded-xl border border-white/10 bg-white/5 text-gray-400 font-bold transition-all">Customer</button>
           <button type="button" onclick="setRegRole('employee')" id="regEmployee" class="reg-role py-3 rounded-xl border border-white/10 bg-white/5 text-gray-400 font-bold transition-all">Employee</button>
           <input type="hidden" name="role" id="regRoleInput" value="customer">
        </div>

        <div class="space-y-1">
          <label class="block text-gray-400 text-xs font-bold uppercase ml-1">Full Name</label>
          <input name="name" type="text" placeholder="John Doe" required
            class="w-full bg-[#161f32] border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition-all">
        </div>

        <div class="space-y-1">
          <label class="block text-gray-400 text-xs font-bold uppercase ml-1">Email Address</label>
          <input name="email" type="email" placeholder="john@example.com" required
            class="w-full bg-[#161f32] border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition-all">
        </div>

        <div class="space-y-1">
          <label class="block text-gray-400 text-xs font-bold uppercase ml-1">Secure Password</label>
          <input name="password" type="password" placeholder="••••••••" required
            class="w-full bg-[#161f32] border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition-all">
        </div>

        <button type="submit" 
          class="w-full mt-6 bg-gradient-to-r from-[#6366f1] via-[#3b82f6] to-[#06b6d4] text-white py-4 rounded-full font-bold text-xl shadow-[0_8px_20px_rgba(59,130,246,0.3)] hover:scale-[1.01] active:scale-[0.98] transition-all">
          Register Now
        </button>
      </form>

      <p class="mt-8 text-gray-400 text-sm">
        Already have an account? 
        <a href="/login" class="text-blue-400 hover:underline font-semibold ml-1">Sign In</a>
      </p>
    </div>
  </div>

  <div class="absolute bottom-0 w-full h-[1px] bg-gradient-to-r from-transparent via-indigo-500/50 to-transparent shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
</div>

<script>
  function setRegRole(role) {
    document.getElementById('regRoleInput').value = role;
    
    // Reset styles
    document.querySelectorAll('.reg-role').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-400');
        btn.classList.add('bg-white/5', 'text-gray-400', 'border-white/10');
    });

    // Set active style
    const active = document.getElementById('reg' + role.charAt(0).toUpperCase() + role.slice(1));
    active.classList.remove('bg-white/5', 'text-gray-400', 'border-white/10');
    active.classList.add('bg-blue-600', 'text-white', 'border-blue-400', 'shadow-[0_0_15px_rgba(37,99,235,0.4)]');
  }

  // Initialize with 'customer' selected
  window.onload = () => setRegRole('customer');
</script>
{% endblock %}
