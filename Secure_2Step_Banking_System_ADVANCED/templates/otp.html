 {% extends "base.html" %}

{% block content %}

<div class="flex items-center justify-center min-h-screen bg-gray-100">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-purple-600 mb-6">
            OTP Verification
        </h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="mb-4">
            {% for msg in messages %}
            <div class="bg-blue-100 text-blue-700 p-2 rounded mb-2">
                {{ msg }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <!-- OTP Form -->
        <form method="POST">

            <label class="block mb-2 font-semibold">
                Enter OTP
            </label>

            <input type="text"
                   name="otp"
                   placeholder="Enter 6-digit OTP"
                   required
                   class="w-full p-3 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500">

            <button type="submit"
                    class="w-full bg-purple-600 text-white p-3 rounded hover:bg-purple-700 transition">
                Verify OTP
            </button>

        </form>

        <!-- Resend OTP -->
        <div class="text-center mt-4">

            <p class="text-gray-600">
                Didn't receive OTP?
            </p>

            <a href="{{ url_for('resend_otp') }}"
               class="text-purple-600 font-semibold hover:underline">
               Resend OTP
            </a>

        </div>

        <!-- Back to login -->
        <div class="text-center mt-4">

            <a href="{{ url_for('login') }}"
               class="text-gray-500 hover:underline">
               Back to Login
            </a>

        </div>

    </div>

</div>

{% endblock %}
