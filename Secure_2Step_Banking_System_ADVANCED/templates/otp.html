 {% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white shadow-lg rounded-2xl p-10 w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Verify Your Email</h2>
    <p class="text-gray-600 mb-4 text-center">Enter the OTP sent to your email</p>

    <form method="POST" class="space-y-4">
      <input 
        name="otp" 
        type="text" 
        maxlength="6"
        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" 
        placeholder="Enter OTP" 
        required
      >
      <button 
        type="submit" 
        class="w-full bg-purple-500 hover:bg-purple-600 text-white py-3 rounded-lg font-semibold transition"
      >
        Verify
      </button>
    </form>

    <p class="mt-4 text-center text-gray-600">
      Didn't receive OTP? 
      <a  href="{{ url_for('resend_otp') }}"  class="text-purple-500 hover:underline">Resend</a>
    </p>
  </div>
</div>
{% endblock %}
