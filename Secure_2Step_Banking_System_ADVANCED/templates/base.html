<!DOCTYPE html>
<html>
<head>
    <title>Banking System</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .toast-glass {
            backdrop-filter: blur(16px);
            background: rgba(16, 185, 129, 0.85);
        }

        .progress-bar {
            animation: progress 4s linear forwards;
        }

        @keyframes progress {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>

</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">

<!-- ================= PREMIUM TOAST ================= -->
{% with messages = get_flashed_messages() %}
{% if messages %}

<div id="toast"
     class="fixed left-1/2 -translate-x-1/2 -top-32
            toast-glass text-white
            px-8 py-5 rounded-2xl shadow-2xl
            min-w-[320px]
            z-50 transition-all duration-700 ease-out">

    <!-- Content -->
    <div class="flex items-center gap-3">

        <!-- Animated Success Icon -->
        <div class="bg-white/20 p-2 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="h-6 w-6 animate-bounce"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 stroke-width="3">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <!-- Message -->
        <div>
            <div class="font-bold text-lg">
                
            </div>

            <div class="text-sm opacity-90">
                {{ messages[0] }}
            </div>
        </div>

    </div>

    <!-- Progress Bar -->
    <div class="w-full bg-white/20 h-1 rounded-full mt-3 overflow-hidden">
        <div class="progress-bar bg-white h-1 rounded-full"></div>
    </div>

</div>

{% endif %}
{% endwith %}
<!-- ================================================= -->

<div class="container mx-auto p-6">
{% block content %}{% endblock %}
</div>

<!-- ================= SCRIPT ================= -->
<script>

document.addEventListener("DOMContentLoaded", function(){

    const toast = document.getElementById("toast");

    if(toast){

        // Slide Down
        setTimeout(()=>{
            toast.classList.remove("-top-32");
            toast.classList.add("top-6");
        },100);

        // Slide Up after 4 sec
        setTimeout(()=>{
            toast.classList.remove("top-6");
            toast.classList.add("-top-32");
        },4000);

    }

});

</script>
<!-- ========================================== -->

</body>
</html>
