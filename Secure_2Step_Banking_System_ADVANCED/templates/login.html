 {% extends 'base.html' %}
{% block content %}
<div class="min-h-screen w-full flex items-center justify-center relative overflow-hidden bg-[#020b1a] font-sans">
  
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute left-[10%] top-1/2 -translate-y-1/2 opacity-40 hidden lg:block">
       <div class="w-80 h-64 border-b-8 border-blue-500/30 rounded-lg bg-gradient-to-t from-blue-900/20 to-transparent relative">
          <div class="absolute -top-16 left-1/2 -translate-x-1/2 text-[120px] text-blue-400/20">🏛️</div>
       </div>
    </div>

    <div class="absolute right-[10%] top-1/2 -translate-y-1/2 opacity-40 hidden lg:block">
       <div class="w-40 h-72 border-4 border-blue-500/30 rounded-[2rem] bg-blue-900/10 relative">
          <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl text-blue-400">🛡️</div>
          <div class="absolute -bottom-10 -left-10 flex gap-1">
             <div class="w-12 h-4 bg-yellow-500/40 rounded-full"></div>
             <div class="w-12 h-6 bg-yellow-500/50 rounded-full"></div>
          </div>
       </div>
    </div>

    <div class="absolute top-[20%] left-[20%] w-96 h-96 bg-blue-600/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[20%] right-[20%] w-96 h-96 bg-indigo-600/10 rounded-full blur-[120px]"></div>
  </div>

  <div class="relative z-20 w-[90%] max-w-[550px] aspect-[1/1.1] p-[2px] rounded-[2.5rem] bg-gradient-to-b from-white/20 to-transparent backdrop-blur-2xl shadow-[0_0_50px_rgba(0,0,0,0.5)]">
    
    <div class="w-full h-full bg-[#0a1120]/80 rounded-[2.4rem] p-8 md:p-12 flex flex-col items-center">
      
      <h2 class="text-4xl md:text-5xl font-bold text-white mb-10 tracking-wide">Bank Login</h2>

      <div class="grid grid-cols-3 gap-3 w-full mb-12">
        <button type="button" onclick="setRole('admin')" id="adminBtn"
          class="role-btn flex items-center justify-center gap-2 py-3 rounded-xl border border-blue-500/50 bg-blue-900/40 text-white font-semibold transition-all hover:brightness-125 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
          <span class="text-sm">⚙️</span> Admin
        </button>
        
        <button type="button" onclick="setRole('employee')" id="employeeBtn"
          class="role-btn flex items-center justify-center gap-2 py-3 rounded-xl border border-orange-500/50 bg-orange-600 text-white font-semibold transition-all hover:brightness-110">
          <span class="text-sm">💼</span> Employee
        </button>
        
        <button type="button" onclick="setRole('customer')" id="customerBtn"
          class="role-btn flex items-center justify-center gap-2 py-3 rounded-xl border border-green-500/50 bg-green-600 text-white font-semibold transition-all hover:brightness-110">
          <span class="text-sm">👤</span> Customer
        </button>
      </div>

      <form method="POST" class="w-full space-y-6">
        <input type="hidden" name="role" id="roleInput" value="admin">

        <div class="space-y-2">
          <label class="block text-gray-300 text-sm font-medium ml-1">Email</label>
          <input type="email" name="email" placeholder="you@example.com" required
            class="w-full bg-[#161f32] border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition-all">
        </div>

        <div class="space-y-2">
          <label class="block text-gray-300 text-sm font-medium ml-1">Password</label>
          <input type="password" name="password" placeholder="••••••••" required
            class="w-full bg-[#161f32] border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition-all">
        </div>

        <button type="submit" 
          class="w-full mt-8 bg-gradient-to-r from-[#2563eb] via-[#3b82f6] to-[#1d4ed8] text-white py-4 rounded-full font-bold text-xl shadow-[0_8px_20px_rgba(37,99,235,0.4)] hover:scale-[1.01] active:scale-[0.98] transition-all">
          Login
        </button>
      </form>

      <p class="mt-8 text-gray-400 text-sm">
        Don't have an account? 
        <a href="/register" class="text-blue-400 hover:underline font-semibold">Register</a>
      </p>
    </div>
  </div>

  <div class="absolute bottom-0 w-full h-[2px] bg-gradient-to-r from-transparent via-blue-500/50 to-transparent shadow-[0_0_20px_blue]"></div>
</div>

<script>
  function setRole(role) {
    document.getElementById('roleInput').value = role;
    
    // Visual feedback: remove highlight from all, add to one
    const btns = ['adminBtn', 'employeeBtn', 'customerBtn'];
    btns.forEach(id => {
      const el = document.getElementById(id);
      el.style.boxShadow = 'none';
      el.style.transform = 'scale(1)';
    });
    
    const activeBtn = document.getElementById(role + 'Btn');
    activeBtn.style.boxShadow = '0 0 20px rgba(255,255,255,0.3)';
    activeBtn.style.transform = 'scale(1.05)';
  }

  // Initialize view
  window.onload = () => setRole('admin');
</script>
{% endblock %}
